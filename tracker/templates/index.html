<h1>Finance Tracker</h1>
<p>Total: ${{ total }}</p>

<a href="{% url 'add' %}">Add Transaction</a> |
<form action="{% url 'logout' %}" method="post" style="display:inline;">
  {% csrf_token %}
  <button type="submit" style="background:none; border:none; color:blue; text-decoration:underline; cursor:pointer; padding:0; font:inherit;">
    Logout
  </button>
</form>

<ul>
  {% for transaction in transactions %}
    <li>
      {{ transaction.title }} - ${{ transaction.amount }}
      <a href="{% url 'edit' transaction.id %}">Edit</a>
      <a href="{% url 'delete' transaction.id %}">Delete</a>
    </li>
  {% endfor %}
</ul>
